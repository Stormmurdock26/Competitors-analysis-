name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish Windows exe
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build executable
        shell: pwsh
        run: .\scripts\build_exe.ps1

      - name: Verify version marker
        shell: pwsh
        run: |
          $expected = "${{ github.ref_name }}".TrimStart("v")
          $actual = (Get-Content ".\dist\app_version.txt" -Raw).Trim()
          if ($actual -ne $expected) {
            throw "Built app version '$actual' does not match tag '${{ github.ref_name }}'."
          }

      - name: Publish GitHub release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = ".\dist\Storm Competitor Analysis.exe"
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $asset --title $tag --notes "Automated Windows build for $tag"
          } else {
            gh release upload $tag $asset --clobber
          }
